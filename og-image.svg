<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#15131d"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8a4c0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b7cff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8b7cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="180" r="320" fill="url(#glow)"/>

  <!-- seal / check -->
  <g transform="translate(900,140)" opacity="0.9">
    <circle cx="120" cy="160" r="118" fill="none" stroke="#8b7cff" stroke-width="3"/>
    <circle cx="120" cy="160" r="95" fill="none" stroke="#8b7cff" stroke-width="1.5" stroke-dasharray="5 6"/>
    <path d="M78 162 L110 196 L168 120" fill="none" stroke="#8b7cff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- brand -->
  <g transform="translate(80,86)">
    <circle cx="14" cy="14" r="13" fill="none" stroke="#8b7cff" stroke-width="2"/>
    <path d="M9 14.5 L12.5 18 L19 10.5" fill="none" stroke="#8b7cff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="22" font-family="-apple-system,'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#e9e8ee">AeonProof</text>
  </g>

  <!-- badge -->
  <g transform="translate(80,166)">
    <rect x="0" y="0" rx="100" ry="100" width="330" height="34" fill="rgba(139,124,255,0.1)" stroke="rgba(139,124,255,0.3)" stroke-width="1"/>
    <circle cx="19" cy="17" r="4.5" fill="#8b7cff"/>
    <text x="34" y="23" font-family="'SF Mono',monospace" font-size="14" fill="#8b7cff">v0.1 · coffre-fort de preuves · ouvert</text>
  </g>

  <!-- headline -->
  <text x="80" y="318" font-family="-apple-system,'Segoe UI',sans-serif" font-size="62" font-weight="600" fill="url(#title)" letter-spacing="-2">La vérité a besoin</text>
  <text x="80" y="392" font-family="-apple-system,'Segoe UI',sans-serif" font-size="62" font-weight="600" letter-spacing="-2">
    <tspan fill="url(#title)">d'un </tspan><tspan fill="#8b7cff">coffre-fort.</tspan>
  </text>

  <!-- subline -->
  <text x="80" y="468" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="#8d8a99">La cryptographie détecte la falsification.</text>
  <text x="80" y="500" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="#8d8a99">L'ADN archive la preuve — pour des siècles.</text>

  <text x="80" y="556" font-family="'SF Mono',monospace" font-size="18" fill="#8b7cff">proof.aeonscript.org</text>
</svg>
